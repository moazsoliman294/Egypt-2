<!Doctype html>
<html>
    <head>
        <title>Inputs</title>
        <link rel="stylesheet" href="input.css">
    </head>
     <body>
        <h1>form</h1>
        <form action="#">
            <label class="j" for="user-name">Name
                <input class="m" type="text" placeholder="enter your name" name="name">
            </label>
            <br>
            <label class="j" for="email"> Email
          <input class="m"  type="email" placeholder="Enter your email" name="email">
            </label>
            <br>
            <label class="j" for="password"> Password
                <input class="m"  type="password" placeholder="Enter your password" name="password">
                  </label>
                  <br>
                  <label class="j" for="phone">Phone number
                    <input class="m"  type="tel" placeholder="Enter your telephone numbr">
                  </label>
                  <br>
                  <label id="e"  for="type">Type</label>
                  <br>
                  <br>
                  <label  for="type">Male
                    <input class="i" type="radio" name="type">
                  </label>
                  <br>
                  <label for="type">Female
                    <input class="l" type="radio" name="type">
                  </label>
                  <br>
                  <label class="j" for="date">date of birth
                    <input class="h"  type="date" name="date of birth">
                </label>
                <br>
                <label class="j" for="Nationality">choose your Nationality</label>
                <br>
                <select name="Nationality" id="Nationality">
                    <option value="">choose one</option>
                    <option value="France">France</option>
                    <option value="Italy">Italy</option>
                    <option value="Germany">Germany</option>
                    <option value="Japan">Japan</option>
                    <option value="Brazil">Brazil</option>
                    <option value="India">India</option>
                    <option value="China">China</option>
                    <option value="Mexico">Mexico</option>
                    <option value="Canada">Canada</option>
                    <option value="Netherlands">Netherlands</option>
                    <option value="United States">United States</option>
                    <option value="New Zealand">New Zealand</option>
                    <option value="Norway">Norway</option>
                </select>
                <br>
                <label class="j" for="citys">The city where you were born</label>
             <input class="m"  type="text" placeholder="Enter The city where you were born"> 
             <br>
                <label class="j" for="birth certificate">birth certificate
                    <input class="m" id="b" type="file">
                </label>
                <br>
                <label class="j" for="languages">Languages you are fluent in</label>
                <br>
                <label  for="languages">English
                  <input class="x" type="checkbox">
                </label>
                <br>
                <label for="languages">Arabic
                  <input class="x" type="checkbox">
                </label>
                <br>
                <label for="languages">German
                  <input class="x" type="checkbox">
                </label>
                <br>
                <label for="languages">Italian
                  <input class="x" type="checkbox">
                </label>
                <br>
                <label for="languages">Japanese
                  <input class="x" type="checkbox">
                </label>
                <br>
                <label for="languages">Chinese
                  <input id="q" class="x" type="checkbox">
                </label>  
                <br>
                <input class="z" type="submit" value="submit">
                <br>
                <input class="r" type="reset" value="reset">
        </form>
     </body>
</html>
